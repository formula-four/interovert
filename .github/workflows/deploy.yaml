name: Manual Backend Deploy on GCP

on: 
  workflow_dispatch:
    inputs:
      custom_env_vars:
        description: 'ENV Variables to upsert (Format: KEY=value,KEY2=value2).'
        required: false
        type: string
      remove_env_vars:
        description: 'ENV Variables to remove (Format: KEY1,KEY2).'
        required: false
        type: string

env:
  PROJECT_ID: project-b56e5d64-2657-4923-937
  SERVICE_NAME: introvert-api
  REPO_NAME: introvert-backend-repo
  REGION: us-central1

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # SECURITY: MASK CUSTOM INPUTS
    - name: Mask Custom Inputs
      run: |
        USER_INPUT="${{ inputs.custom_env_vars }}"
        if [ -n "$USER_INPUT" ]; then
          echo "::add-mask::$USER_INPUT"
        fi

    # AUTHENTICATION: WORKLOAD IDENTITY FEDERATION
    - name: Google Auth
      id: auth
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: 'projects/1049016103787/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
        service_account: 'githup-actions-deployer@project-b56e5d64-2657-4923-937.iam.gserviceaccount.com'

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Login to Artifact Registry
      run: |
        gcloud auth print-access-token | docker login -u oauth2accesstoken --password-stdin https://$REGION-docker.pkg.dev

    - name: Build and Push Docker Image
      run: |
        IMAGE_PATH=$REGION-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/$SERVICE_NAME:${{ github.sha }}
        docker build -t $IMAGE_PATH .
        docker push $IMAGE_PATH

    - name: Deploy to Cloud Run
      run: |
        IMAGE_PATH=$REGION-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/$SERVICE_NAME:${{ github.sha }}
        USER_VARS="${{ inputs.custom_env_vars }}"
        REMOVE_VARS="${{ inputs.remove_env_vars }}"

        # Use a bash array to construct the command safely
        DEPLOY_ARGS=(
          "gcloud" "run" "deploy" "$SERVICE_NAME"
          "--image=$IMAGE_PATH"
          "--region=$REGION"
        )

        # Check and append the update flag if provided
        if [ -n "$USER_VARS" ]; then
          echo "Deploying with updated environment variables (Values are masked)..."
          DEPLOY_ARGS+=("--update-env-vars=$USER_VARS")
        fi

        # Check and append the remove flag if provided
        if [ -n "$REMOVE_VARS" ]; then
          echo "Removing environment variables: $REMOVE_VARS"
          DEPLOY_ARGS+=("--remove-env-vars=$REMOVE_VARS")
        fi

        # Print a clear log if no env var changes are being made
        if [ -z "$USER_VARS" ] && [ -z "$REMOVE_VARS" ]; then
          echo "Deploying code only. Existing environment variables and VPC settings are preserved."
        fi

        # Execute the final command
        "${DEPLOY_ARGS[@]}"